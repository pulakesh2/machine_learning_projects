<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}AI Impact on Jobs Dashboard{% endblock %}</title>
    <meta name="description" content="A premium analytics dashboard exploring AI replacement risks, future job demands, and country-specific insights." />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  </head>
  <body>
    <div class="app-container">
      <!-- Sidebar Navigation -->
      <aside class="sidebar">
        <div class="sidebar-header">
          <i class="fa-solid fa-brain-circuit logo-icon" style="color: #6366f1; font-size: 24px; margin-right: 10px;"></i>
          <h2>AI Impact</h2>
        </div>
        <nav class="sidebar-nav">
          <a href="{{ url_for('home') }}" class="nav-item {% if request.path == '/' %}active{% endif %}">
            <i class="fa-solid fa-chart-pie"></i>
            <span>Overview</span>
          </a>
          <a href="{{ url_for('ai_risk') }}" class="nav-item {% if request.path == '/ai_risk' %}active{% endif %}">
            <i class="fa-solid fa-triangle-exclamation"></i>
            <span>AI Risk</span>
          </a>
          <a href="{{ url_for('future_demand') }}" class="nav-item {% if request.path == '/future_demand' %}active{% endif %}">
            <i class="fa-solid fa-arrow-trend-up"></i>
            <span>Future Demand</span>
          </a>
          <a href="{{ url_for('india') }}" class="nav-item {% if request.path == '/india' %}active{% endif %}">
            <i class="fa-solid fa-flag-usa" style="color: #ff9933;"></i> <!-- We will style India icon -->
            <span>India Insights</span>
          </a>
          <a href="{{ url_for('pakistan') }}" class="nav-item {% if request.path == '/pakistan' %}active{% endif %}">
            <i class="fa-solid fa-flag" style="color: #117a65;"></i>
            <span>Pakistan Insights</span>
          </a>
          <a href="{{ url_for('column_relationship') }}" class="nav-item {% if request.path == '/column_relationship' %}active{% endif %}">
            <i class="fa-solid fa-diagram-project"></i>
            <span>Relationships</span>
          </a>
        </nav>
        <div class="sidebar-footer">
          <p>© 2026 AI Job Insights</p>
        </div>
      </aside>

      <!-- Main Content Area -->
      <main class="main-content">
        <header class="main-header">
          <div class="header-title">
            <h1>{% block header_title %}Dashboard{% endblock %}</h1>
            <p class="header-subtitle">{% block header_subtitle %}Overview and key statistics{% endblock %}</p>
          </div>
          <div class="header-actions">
            <span class="badge badge-success"><i class="fa-solid fa-database"></i> data.csv Active</span>
          </div>
        </header>

        <section class="content-body">
          {% block content %}{% endblock %}
        </section>
      </main>
    </div>
  </body>
</html>
